spring.application.name=jwt-study

# ==========================================
# BANCO DE DADOS
# ==========================================

# Endereço do banco. localhost = rodando na sua máquina.
# 5432 = porta padrăo do Postgres.
# jwt_study = nome do banco que vocę vai criar no Postgres.
spring.datasource.url=jdbc:postgresql://localhost:5432/jwt_study

# Usuário e senha do seu Postgres local.
# Troca para os seus dados se forem diferentes.
spring.datasource.username=admin
spring.datasource.password=admin

# Driver que o Java usa para falar com o Postgres.
# O Spring já saberia descobrir isso sozinho pelo pom.xml,
# mas deixar explícito é boa prática em projeto de estudo.
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================

# update = o Hibernate olha suas entidades (@Entity) e atualiza
# as tabelas no banco automaticamente.
# Isso é bom para desenvolvimento. Em produçăo usa-se "validate"
# ou ferramentas como Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update

# Mostra no console do IntelliJ o SQL que o Hibernate está
# executando. Essencial para entender o que está acontecendo
# enquanto vocę estuda.
spring.jpa.show-sql=true

# Formata o SQL mostrado no console de forma legível,
# com indentaçăo. Sem isso sai tudo numa linha só.
spring.jpa.properties.hibernate.format_sql=true

# Dialeto = o "sotaque" do SQL para o Postgres.
# O Hibernate suporta vários bancos e cada um tem pequenas
# diferenças de sintaxe. Isso diz qual usar.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# JWT
# ==========================================

# Chave secreta usada para assinar e verificar os tokens.
# Pensa nela como o carimbo que só o seu servidor conhece.
# Em produçăo isso vai em variável de ambiente, nunca no código.
# Precisa ter no mínimo 256 bits (32 caracteres) para o algoritmo HS256.
jwt.secret=minha-chave-secreta-super-segura-para-estudo-local-123

# Tempo de expiraçăo do token em milissegundos.
# 86400000 = 24 horas (1000ms * 60s * 60min * 24h).
# Depois desse tempo o token vence e o usuário precisa logar de novo.
jwt.expiration=86400000